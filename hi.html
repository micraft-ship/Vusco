<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Neon Hacker Search Bar</title>
        <style>
            /* Hacker background */
                body {
                      margin: 0;
                            font-family: Arial, sans-serif;
                                  background: radial-gradient(circle at 50% 50%, #000 0%, #111 100%);
                                        height: 100vh;
                                              display: flex;
                                                    justify-content: flex-start;
                                                          align-items: flex-start;
                                                                padding-top: 50px; /* space from top */
                                                                    }

                                                                        /* Neon search bar */
                                                                            .neon-search {
                                                                                  width: 500px;
                                                                                        margin: 0 auto;
                                                                                              display: block;
                                                                                                    padding: 15px 20px;
                                                                                                          font-size: 20px;
                                                                                                                border: none;
                                                                                                                      outline: none;
                                                                                                                            border-radius: 10px;
                                                                                                                                  background: black;
                                                                                                                                        color: #00f5d4;
                                                                                                                                              letter-spacing: 1px;
                                                                                                                                                    text-shadow: 0 0 5px #00f5d4, 0 0 10px #00bfff, 0 0 20px #8a2be2;
                                                                                                                                                          background-image: linear-gradient(90deg, #00f5d4, #00bfff, #8a2be2, #ff00ff, #00f5d4);
                                                                                                                                                                background-size: 300% 300%;
                                                                                                                                                                      -webkit-background-clip: text;
                                                                                                                                                                            -webkit-text-fill-color: transparent;
                                                                                                                                                                                  animation: moveGradient 3s infinite linear;
                                                                                                                                                                                        box-shadow: 0 0 10px #00f5d4, 0 0 20px #00bfff, 0 0 40px #8a2be2;
                                                                                                                                                                                              transition: all 0.3s ease;
                                                                                                                                                                                                  }

                                                                                                                                                                                                      /* Glow effect on focus/click */
                                                                                                                                                                                                          .neon-search:focus {
                                                                                                                                                                                                                box-shadow: 0 0 20px #00f5d4, 0 0 40px #00bfff, 0 0 80px #8a2be2;
                                                                                                                                                                                                                      animation: moveGradient 1.5s infinite linear;
                                                                                                                                                                                                                          }

                                                                                                                                                                                                                              .neon-search::placeholder {
                                                                                                                                                                                                                                    color: #00f5d4;
                                                                                                                                                                                                                                          text-shadow: 0 0 5px #00f5d4, 0 0 10px #00bfff;
                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                  /* Animation for moving gradient */
                                                                                                                                                                                                                                                      @keyframes moveGradient {
                                                                                                                                                                                                                                                            0% { background-position: 0% 50%; }
                                                                                                                                                                                                                                                                  50% { background-position: 100% 50%; }
                                                                                                                                                                                                                                                                        100% { background-position: 0% 50%; }
                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                              </style>
                                                                                                                                                                                                                                                                              </head>
                                                                                                                                                                                                                                                                              <body>

                                                                                                                                                                                                                                                                                <!-- Glowing neon search bar at the top -->
                                                                                                                                                                                                                                                                                  <input type="text" class="neon-search" placeholder="Search...">

                                                                                                                                                                                                                                                                                  </body>
                                                                                                                                                                                                                                                                                  </html>
